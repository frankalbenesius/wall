name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci

      - run: npm run build

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOMELAB_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.HOMELAB_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Deploy to homelab
        run: |
          rsync -av --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            dist/ \
            root@${{ secrets.HOMELAB_HOST }}:/opt/homelab/sites/wall/
