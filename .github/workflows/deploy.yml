name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bun run build

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOMELAB_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.HOMELAB_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Deploy to homelab
        run: |
          rsync -av --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            dist/ \
            root@${{ secrets.HOMELAB_HOST }}:/opt/homelab/sites/wall/
